# OpenTelemetry Java Agent configuration
# Loaded via -Dotel.javaagent.configuration-file in Dockerfile ENTRYPOINT
# See: https://opentelemetry.io/docs/zero-code/java/agent/configuration/
#
# Secrets (OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_HEADERS) remain
# as Render env vars. Env vars override properties in this file.

# --- Export ---
otel.exporter.otlp.protocol=http/protobuf
otel.metrics.exporter=otlp
otel.service.name=nextskip
otel.resource.attributes=deployment.environment.name=production,service.name=nextskip

# --- Sampling ---
otel.traces.sampler=traceidratio
otel.traces.sampler.arg=0.1

# --- Instrumentation ---
otel.instrumentation.micrometer.enabled=true
otel.instrumentation.jdbc-datasource.enabled=true
otel.instrumentation.spring-webmvc.excluded-paths=/health

# Custom method tracing — creates spans for the band activity pipeline
# so slow aggregations are visible in Grafana Tempo end-to-end.
otel.instrumentation.methods.include=\
  io.nextskip.spots.internal.SpotsServiceImpl[getCurrentActivity];\
  io.nextskip.spots.internal.aggregation.BandActivityAggregator[aggregateAllBands,aggregateBandMode];\
  io.nextskip.spots.internal.scheduler.BandActivityRefreshService[doRefresh]

# --- Pyroscope ---
pyroscope.application.name=nextskip
pyroscope.format=jfr
pyroscope.labels=env=production,service_name=nextskip
pyroscope.profiler.alloc=512k
pyroscope.profiler.lock=10ms
